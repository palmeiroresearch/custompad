<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — CustomPad Studio</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: white; text-align: center; padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.15);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 380px;
      width: 100%;
    }
    .icon { font-size: 72px; margin-bottom: 20px; }
    h1 {
      font-size: 24px; font-weight: 800;
      margin-bottom: 12px; letter-spacing: -0.5px;
    }
    p {
      font-size: 15px; opacity: .85;
      line-height: 1.6; margin-bottom: 28px;
    }
    button {
      background: white; color: #667eea;
      border: none; border-radius: 50px;
      padding: 14px 32px; font-size: 15px;
      font-weight: 700; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.2);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay internet en este momento. Las páginas que visitaste antes siguen disponibles sin conexión.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
